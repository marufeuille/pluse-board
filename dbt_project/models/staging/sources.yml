version: 2

sources:
  - name: fitbit_raw
    database: "{{ env_var('PROJECT_ID', var('project_id', '')) }}"
    schema: "{{ env_var('BQ_DATASET_RAW', 'fitbit_raw') }}"
    tables:
      - name: exercise
        description: "Google Health API から取得した運動セッションデータ"
        columns:
          - name: interval_civil_start_time
            description: "運動開始日時（civil time）"
          - name: interval_civil_end_time
            description: "運動終了日時（civil time）"
          - name: activity_name
            description: "運動種別名（例: 筋トレ、ウォーキング）"
          - name: duration_ms
            description: "運動時間（ミリ秒）"
          - name: calories
            description: "消費カロリー"
          - name: distance_m
            description: "移動距離（メートル）"

      - name: steps
        description: "Google Health API から取得した歩数データ"
        columns:
          - name: interval_civil_start_time
          - name: interval_civil_end_time
          - name: steps

      - name: active_zone_minutes
        description: "Google Health API から取得したアクティブゾーン分（ACWR 計算用）"
        columns:
          - name: interval_civil_start_time
          - name: interval_civil_end_time
          - name: value
            description: "アクティブゾーン分数"
