name: Daily Build Triage

on:
  workflow_run:
    workflows: ["Daily Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Daily Build run ID to triage. Leave empty when using a synthetic test case."
        required: false
        type: string
      dry_run:
        description: "When true, do not rerun jobs, open PRs, or create issues."
        required: true
        default: true
        type: boolean
      test_case:
        description: "Synthetic failed-run log to test classification without a real failed run."
        required: true
        default: none
        type: choice
        options:
          - none
          - transient_network
          - report_dependency
          - dbt_sql
          - gcp_wif_manual
          - health_data_manual

permissions:
  contents: read

jobs:
  triage:
    name: Triage failure
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'failure'
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      classification: ${{ steps.parse.outputs.classification }}
      dry_run: ${{ steps.context.outputs.dry_run }}
      head_branch: ${{ steps.context.outputs.head_branch }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      run_attempt: ${{ steps.context.outputs.run_attempt }}
      run_id: ${{ steps.context.outputs.run_id }}
      run_url: ${{ steps.context.outputs.run_url }}
      should_rerun: ${{ steps.parse.outputs.should_rerun }}
      should_open_pr: ${{ steps.parse.outputs.should_open_pr }}
      summary: ${{ steps.parse.outputs.summary }}
    steps:
      - name: Resolve run context
        id: context
        env:
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_RUN_ID: ${{ inputs.run_id }}
          DISPATCH_TEST_CASE: ${{ inputs.test_case }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          WORKFLOW_RUN_ACTOR: ${{ github.event.workflow_run.actor.login }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          actor="$GITHUB_ACTOR"
          conclusion="failure"
          dry_run="false"
          event="workflow_run"
          head_branch="$GITHUB_REF_NAME"
          head_sha="$GITHUB_SHA_VALUE"
          run_attempt="0"
          run_id=""
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          test_case="none"
          workflow_name="Daily Build"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            dry_run="${DISPATCH_DRY_RUN:-true}"
            test_case="${DISPATCH_TEST_CASE:-none}"

            if [ -n "${DISPATCH_RUN_ID:-}" ]; then
              run_json="$(
                gh run view "$DISPATCH_RUN_ID" \
                  --json attempt,conclusion,event,headBranch,headSha,url,workflowName
              )"
              run_id="$DISPATCH_RUN_ID"
              run_attempt="$(jq -r '.attempt // 0' <<< "$run_json")"
              conclusion="$(jq -r '.conclusion // "unknown"' <<< "$run_json")"
              event="$(jq -r '.event // "unknown"' <<< "$run_json")"
              head_branch="$(jq -r '.headBranch // ""' <<< "$run_json")"
              head_sha="$(jq -r '.headSha // ""' <<< "$run_json")"
              run_url="$(jq -r '.url // ""' <<< "$run_json")"
              workflow_name="$(jq -r '.workflowName // "Daily Build"' <<< "$run_json")"
            elif [ "$dry_run" != "true" ]; then
              echo "::error::workflow_dispatch with dry_run=false requires run_id."
              exit 1
            else
              event="manual_synthetic"
              workflow_name="Daily Build synthetic test"
            fi
          else
            actor="$WORKFLOW_RUN_ACTOR"
            conclusion="$WORKFLOW_RUN_CONCLUSION"
            event="$WORKFLOW_RUN_EVENT"
            head_branch="$WORKFLOW_RUN_HEAD_BRANCH"
            head_sha="$WORKFLOW_RUN_HEAD_SHA"
            run_attempt="$WORKFLOW_RUN_ATTEMPT"
            run_id="$WORKFLOW_RUN_ID"
            run_url="$WORKFLOW_RUN_URL"
            workflow_name="$WORKFLOW_RUN_NAME"
          fi

          {
            echo "actor=$actor"
            echo "conclusion=$conclusion"
            echo "dry_run=$dry_run"
            echo "event=$event"
            echo "head_branch=$head_branch"
            echo "head_sha=$head_sha"
            echo "run_attempt=$run_attempt"
            echo "run_id=$run_id"
            echo "run_url=$run_url"
            echo "test_case=$test_case"
            echo "workflow_name=$workflow_name"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.context.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Write triage context
        run: |
          cat > daily-build-context.md << EOF
          workflow_name: ${{ steps.context.outputs.workflow_name }}
          workflow_run_id: ${{ steps.context.outputs.run_id }}
          workflow_run_attempt: ${{ steps.context.outputs.run_attempt }}
          workflow_event: ${{ steps.context.outputs.event }}
          workflow_conclusion: ${{ steps.context.outputs.conclusion }}
          head_branch: ${{ steps.context.outputs.head_branch }}
          head_sha: ${{ steps.context.outputs.head_sha }}
          actor: ${{ steps.context.outputs.actor }}
          run_url: ${{ steps.context.outputs.run_url }}
          dry_run: ${{ steps.context.outputs.dry_run }}
          test_case: ${{ steps.context.outputs.test_case }}
          EOF

      - name: Prepare failed run logs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.context.outputs.run_id }}
          TEST_CASE: ${{ steps.context.outputs.test_case }}
        run: |
          set -euo pipefail

          if [ "$TEST_CASE" != "none" ]; then
            cp ".github/codex/testdata/daily-build/$TEST_CASE.log" failed-run.log
          elif [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --log-failed > failed-run.log ||
              gh run view "$RUN_ID" --log > failed-run.log ||
              true
          else
            echo "No run_id or test_case was provided." > failed-run.log
          fi

          if [ ! -s failed-run.log ]; then
            echo "No logs were available from gh run view." > failed-run.log
          fi

      - name: Triage with Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          prompt-file: .github/codex/prompts/daily-build-triage.md
          codex-args: >-
            ["--output-schema", ".github/codex/schemas/daily-build-triage.schema.json"]
          output-file: codex-triage.json

      - name: Parse triage result
        id: parse
        run: |
          classification="$(jq -r '.classification' codex-triage.json)"
          should_rerun="$(jq -r '.should_rerun' codex-triage.json)"
          should_open_pr="$(jq -r '.should_open_pr' codex-triage.json)"

          {
            echo "classification=$classification"
            echo "should_rerun=$should_rerun"
            echo "should_open_pr=$should_open_pr"
            echo "summary<<EOF"
            jq -r '.summary' codex-triage.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Daily Build triage"
            echo
            echo "- Classification: \`$classification\`"
            echo "- Dry run: \`${{ steps.context.outputs.dry_run }}\`"
            echo "- Should rerun: \`$should_rerun\`"
            echo "- Should open PR: \`$should_open_pr\`"
            echo
            jq -r '.summary' codex-triage.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-build-triage
          path: |
            daily-build-context.md
            failed-run.log
            codex-triage.json
          if-no-files-found: error

  rerun:
    name: Rerun transient failure
    needs: triage
    if: >-
      ${{
        needs.triage.outputs.dry_run != 'true' &&
        needs.triage.outputs.should_rerun == 'true' &&
        needs.triage.outputs.run_attempt == '1' &&
        needs.triage.outputs.run_id != ''
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Rerun failed jobs once
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ needs.triage.outputs.run_id }}
        run: gh run rerun "$RUN_ID" --failed --repo "$REPO"

  generate_patch:
    name: Generate patch
    needs: triage
    if: ${{ needs.triage.outputs.should_open_pr == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      has_patch: ${{ steps.diff.outputs.has_patch }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.triage.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reports/package-lock.json

      - name: Download triage artifacts
        uses: actions/download-artifact@v4
        with:
          name: daily-build-triage
          path: .codex-runtime

      - name: Generate patch with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .github/codex/prompts/daily-build-patch.md
          codex-args: '["--ephemeral"]'
          output-file: /tmp/codex-patch-summary.md

      - name: Create patch artifact
        id: diff
        run: |
          rm -rf .codex-runtime
          git add -N .
          git diff --binary HEAD > codex.patch
          if [ -s codex.patch ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload patch artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-build-codex-patch
          path: codex.patch
          if-no-files-found: error

      - name: Upload patch summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-build-codex-patch-summary
          path: /tmp/codex-patch-summary.md
          if-no-files-found: ignore

  open_patch_pr:
    name: Open patch PR
    needs: [triage, generate_patch]
    if: >-
      ${{
        needs.triage.outputs.dry_run != 'true' &&
        needs.generate_patch.outputs.has_patch == 'true'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.triage.outputs.head_sha }}
          fetch-depth: 0

      - name: Download patch artifact
        uses: actions/download-artifact@v4
        with:
          name: daily-build-codex-patch

      - name: Apply patch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_HEAD_BRANCH: ${{ needs.triage.outputs.head_branch }}
          FAILED_HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
          FAILED_RUN_ID: ${{ needs.triage.outputs.run_id }}
          FAILED_RUN_URL: ${{ needs.triage.outputs.run_url }}
        run: |
          base_branch="${FAILED_HEAD_BRANCH:-main}"
          run_id="${FAILED_RUN_ID:-manual-$GITHUB_RUN_ID}"
          branch="codex/daily-build-fix-$run_id"

          git apply --index codex.patch
          if git diff --cached --quiet; then
            echo "Patch artifact did not produce staged changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -m "Auto-fix Daily Build via Codex"
          git push --force-with-lease origin "$branch:$branch"

          {
            echo "Codex generated this patch after Daily Build failed."
            echo
            echo "- Failed run: $FAILED_RUN_URL"
            echo "- Failed commit: \`$FAILED_HEAD_SHA\`"
            echo
            echo "Review the changes before merging."
          } > pr-body.md

          existing_pr="$(
            gh pr list \
              --head "$branch" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_pr" ]; then
            gh pr comment "$existing_pr" --body-file pr-body.md
          else
            gh pr create \
              --base "$base_branch" \
              --head "$branch" \
              --title "Auto-fix Daily Build via Codex" \
              --body-file pr-body.md
          fi

  report_manual:
    name: Report manual follow-up
    needs: [triage, generate_patch]
    if: >-
      ${{
        always() &&
        needs.triage.result == 'success' &&
        needs.triage.outputs.dry_run != 'true' &&
        !(needs.triage.outputs.should_rerun == 'true' && needs.triage.outputs.run_attempt == '1') &&
        needs.generate_patch.outputs.has_patch != 'true'
      }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update follow-up issue
        uses: actions/github-script@v7
        env:
          CLASSIFICATION: ${{ needs.triage.outputs.classification }}
          SUMMARY: ${{ needs.triage.outputs.summary }}
          RUN_URL: ${{ needs.triage.outputs.run_url }}
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
        with:
          script: |
            const classification = process.env.CLASSIFICATION || 'unknown_manual';
            const title = `Daily Build failed: ${classification}`;
            const body = [
              `Daily Build failed and requires follow-up.`,
              ``,
              `- Classification: \`${classification}\``,
              `- Run: ${process.env.RUN_URL}`,
              `- Commit: \`${process.env.HEAD_SHA}\``,
              ``,
              process.env.SUMMARY || 'No summary was produced.'
            ].join('\n');

            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 50
            });
            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }

  create_beads_issue:
    name: Create beads issue
    needs: [triage, generate_patch]
    if: >-
      ${{
        always() &&
        needs.triage.result == 'success' &&
        needs.triage.outputs.dry_run != 'true' &&
        !(needs.triage.outputs.should_rerun == 'true' && needs.triage.outputs.run_attempt == '1') &&
        needs.generate_patch.outputs.has_patch != 'true'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bd
        with:
          dolt-creds-key-id: ${{ secrets.DOLT_CREDS_KEY_ID }}
          dolt-creds-jwk: ${{ secrets.DOLT_CREDS_JWK }}
      - name: Create beads issue
        env:
          CLASSIFICATION: ${{ needs.triage.outputs.classification }}
          SUMMARY: ${{ needs.triage.outputs.summary }}
          RUN_URL: ${{ needs.triage.outputs.run_url }}
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
          RUN_ID: ${{ needs.triage.outputs.run_id }}
        run: |
          set -euo pipefail
          title="Daily Build failed: ${CLASSIFICATION}"
          body="$(printf 'Daily Build failed and requires follow-up.\n\n- Classification: %s\n- Run: %s\n- Commit: %s\n\n%s' \
                  "${CLASSIFICATION}" "${RUN_URL}" "${HEAD_SHA}" "${SUMMARY}")"
          existing="$(bd search "${title}" --json 2>/dev/null | jq -r --arg title "${title}" '.[] | select(.title == $title) | .id' | head -1 || true)"
          if [ -n "$existing" ]; then
            bd comment "$existing" --body "$body"
          else
            id="$(bd q "$title" -t bug -p 1 -l daily-build,triage)"
            bd update "$id" --description "$body" --external-ref "gh-run-${RUN_ID}"
          fi
      - name: Sync to DoltHub
        run: |
          set -euo pipefail
          # dolt pull has no --force flag; default is fetch+merge which preserves the
          # locally-created issue. Retry: pull remote changes, then push the merge.
          bd dolt push || (bd dolt pull && bd dolt push)
