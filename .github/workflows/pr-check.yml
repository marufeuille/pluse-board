name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: "1.7.12"
    steps:
      - uses: actions/checkout@v4

      - name: Download actionlint
        id: get_actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) "$ACTIONLINT_VERSION" "$RUNNER_TEMP/actionlint"
        shell: bash

      - name: Lint workflow files
        run: |
          "${{ steps.get_actionlint.outputs.executable }}" -color
        shell: bash

  python-lock:
    name: Python lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Check uv lockfile
        run: uv lock --check

      - name: Install Python dependency groups
        run: |
          uv sync --frozen --only-group ingest
          uv sync --frozen --only-group dbt

  reports-lock:
    name: Reports lock
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reports
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reports/package-lock.json

      - name: Install report dependencies
        run: npm ci
