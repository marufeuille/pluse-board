name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflow files
        run: ./scripts/actionlint

  python-lock:
    name: Python lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Check uv lockfile
        run: uv lock --check

      - name: Install Python dependency groups
        run: |
          uv sync --frozen --only-group ingest
          uv sync --frozen --only-group sqlmesh

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: uv sync --frozen --group ingest --group dev

      - name: Run unit tests
        run: uv run pytest --cov

  reports-lock:
    name: Reports lock
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reports
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reports/package-lock.json

      - name: Install report dependencies
        run: npm ci

      - name: Check report dependency compatibility
        run: npm ls @sveltejs/vite-plugin-svelte tailwindcss

      - name: Build report site
        run: npm run build
