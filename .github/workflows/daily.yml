name: Daily Build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"   # 毎日 09:00 JST（UTC 00:00 = SQLMesh @daily 境界に合わせる）
  workflow_dispatch:

permissions:
  id-token: write   # WIF 認証に必要
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      dq_status: ${{ steps.dq.outputs.status }}
      dq_score: ${{ steps.dq.outputs.score }}
      dq_job: ${{ steps.dq.outputs.job_name }}
      dq_failed_rules: ${{ steps.dq.outputs.failed_rules }}
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: >-
            projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: fitbit-dashboard@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
          # OpenLineage → Dataplex 投入用に短命アクセストークンも発行する（ADC は従来どおり併存）
          token_format: access_token

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Ingest from Health API
        if: github.event_name != 'push'
        env:
          GOOGLE_HEALTH_CLIENT_ID: ${{ secrets.GOOGLE_HEALTH_CLIENT_ID }}
          GOOGLE_HEALTH_CLIENT_SECRET: ${{ secrets.GOOGLE_HEALTH_CLIENT_SECRET }}
          GOOGLE_HEALTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_HEALTH_REFRESH_TOKEN }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          # OpenLineage → Dataplex（Knowledge Catalog）に Health API→raw の辺を投入。
          # best-effort: 送信失敗しても ::warning:: のみで ingest は止めない（ingest/lineage.py）。
          OPENLINEAGE_URL: https://datalineage.googleapis.com
          OPENLINEAGE_ENDPOINT: v1/projects/${{ vars.PROJECT_ID }}/locations/${{ vars.BQ_LOCATION }}:processOpenLineageRunEvent
          OPENLINEAGE_API_KEY: ${{ steps.auth.outputs.access_token }}
        run: |
          uv sync --only-group ingest --only-group lineage
          uv run python ingest/pull_health_api.py

      - name: Check Health API freshness
        if: github.event_name != 'push'
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
        run: |
          uv run python ingest/check_health_data_freshness.py

      # state DB(Neon) のスキーマを実行中の sqlmesh バージョンに追従させる。
      # バージョン一致時は no-op。Dependabot が sqlmesh を上げた直後に
      # "local is ahead of remote" で plan/run が落ちるのを防ぐ（例: 0.235.4→0.236.0）。
      - name: Migrate SQLMesh state
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          SQLMESH_STATE_HOST: ${{ secrets.SQLMESH_STATE_HOST }}
          SQLMESH_STATE_USER: ${{ secrets.SQLMESH_STATE_USER }}
          SQLMESH_STATE_PASSWORD: ${{ secrets.SQLMESH_STATE_PASSWORD }}
        run: |
          uv sync --only-group sqlmesh --only-group lineage
          cd sqlmesh_project && uv run sqlmesh --gateway ci migrate

      # SQLMesh: コード変更(push)はモデル差分を prod に適用、
      # データ更新(schedule/dispatch)は incremental 区間を前進実行。
      # state は Neon(Postgres) に永続化（SQLMESH_STATE_* secrets）。
      - name: Apply SQLMesh model changes (deploy)
        if: github.event_name == 'push'
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          SQLMESH_STATE_HOST: ${{ secrets.SQLMESH_STATE_HOST }}
          SQLMESH_STATE_USER: ${{ secrets.SQLMESH_STATE_USER }}
          SQLMESH_STATE_PASSWORD: ${{ secrets.SQLMESH_STATE_PASSWORD }}
          # OpenLineage → Dataplex に SQLMesh モデル評価の辺(カラム lineage + 実行統計)を投入。
          # best-effort: 送信失敗しても ::warning:: のみで SQLMesh 実行は止めない（run_with_lineage.py）。
          OPENLINEAGE_URL: https://datalineage.googleapis.com
          OPENLINEAGE_ENDPOINT: v1/projects/${{ vars.PROJECT_ID }}/locations/${{ vars.BQ_LOCATION }}:processOpenLineageRunEvent
          OPENLINEAGE_API_KEY: ${{ steps.auth.outputs.access_token }}
        run: |
          uv sync --only-group sqlmesh --only-group lineage
          cd sqlmesh_project && uv run python run_with_lineage.py plan --gateway ci

      - name: Run SQLMesh (advance intervals)
        if: github.event_name != 'push'
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          SQLMESH_STATE_HOST: ${{ secrets.SQLMESH_STATE_HOST }}
          SQLMESH_STATE_USER: ${{ secrets.SQLMESH_STATE_USER }}
          SQLMESH_STATE_PASSWORD: ${{ secrets.SQLMESH_STATE_PASSWORD }}
          # OpenLineage → Dataplex に SQLMesh モデル評価の辺(カラム lineage + 実行統計)を投入。
          # best-effort: 送信失敗しても ::warning:: のみで SQLMesh 実行は止めない（run_with_lineage.py）。
          OPENLINEAGE_URL: https://datalineage.googleapis.com
          OPENLINEAGE_ENDPOINT: v1/projects/${{ vars.PROJECT_ID }}/locations/${{ vars.BQ_LOCATION }}:processOpenLineageRunEvent
          OPENLINEAGE_API_KEY: ${{ steps.auth.outputs.access_token }}
        run: |
          uv sync --only-group sqlmesh --only-group lineage
          cd sqlmesh_project && uv run python run_with_lineage.py run --gateway ci

      # マートが更新された直後に Dataplex 品質スキャンを起動し、合否を同期的に判定する。
      # best-effort: スキャン失敗・タイムアウトでも status=error で exit 0（daily.yml は止めない）。
      # FAIL(status=fail) のときだけ後続の notify_dq が beads 起票 + Slack 通知する。
      - name: Run Dataplex data quality scan
        id: dq
        # スクリプトは全経路で exit 0 する。continue-on-error は env 未設定など
        # スクリプトに入る前の設定ミス用の最後の安全網（その場合 status は空になり notify_dq は走らない）。
        continue-on-error: true
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          DATASCAN_ID: mart-steps-daily-quality
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: ./scripts/dataplex_dq_scan.sh

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build Evidence
        working-directory: reports
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_DATASET_MART: ${{ vars.BQ_DATASET_MART }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
        run: |
          npm ci
          npm run sources
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: reports/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # 品質スキャンが FAIL したときだけ走る。ガバナンス層の通知であって
  # パイプラインのゲートではないので、deploy は止めない（deploy は needs: build のまま）。
  notify_dq:
    name: Notify data quality failure
    needs: build
    if: ${{ always() && needs.build.outputs.dq_status == 'fail' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # slack-beads-create.yml と同じグループ。bd の書き込みを直列化して DoltHub push レースを防ぐ。
    concurrency:
      group: beads-slack
      cancel-in-progress: false
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ vars.SLACK_ALERT_CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bd
        with:
          dolt-creds-key-id: ${{ secrets.DOLT_CREDS_KEY_ID }}
          dolt-creds-jwk: ${{ secrets.DOLT_CREDS_JWK }}

      - name: Create beads issue
        id: beads
        env:
          DQ_SCORE: ${{ needs.build.outputs.dq_score }}
          DQ_JOB: ${{ needs.build.outputs.dq_job }}
          DQ_FAILED_RULES: ${{ needs.build.outputs.dq_failed_rules }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="Dataplex DQ FAIL: mart_steps_daily"
          body="$(printf 'Dataplex のデータ品質スキャンが FAIL した（パイプラインは継続している）。\n\n- スコア: %s\n- ジョブ: %s\n- Run: %s\n\n## 失敗ルール\n\n%s' \
                  "${DQ_SCORE}" "${DQ_JOB}" "${RUN_URL}" "${DQ_FAILED_RULES}")"

          # タイトル完全一致で dedupe（bd search はキーワード検索なので jq で絞る）。
          # 同じルールが翌日も落ちたら新規起票せず既存 issue にコメントを積む。
          existing="$(bd search "${title}" --json 2>/dev/null | jq -r --arg title "${title}" '.[] | select(.title == $title) | .id' | head -1 || true)"
          if [ -n "$existing" ]; then
            id="$existing"
            bd comment "$id" "$body"
          else
            id="$(bd q "$title" -t bug -p 2 -l dataplex,data-quality)"
            bd update "$id" --description "$body" --external-ref "gh-run-${RUN_ID}"
          fi
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Sync to DoltHub
        run: |
          set -euo pipefail
          # dolt pull has no --force flag; default is fetch+merge which preserves the
          # locally-created issue. Retry: pull remote changes, then push the merge.
          bd dolt push || (bd dolt pull && bd dolt push)

      # SLACK_BOT_TOKEN(secret) と SLACK_ALERT_CHANNEL_ID(variable) が揃うまでは no-op。
      # beads 起票だけで通知は成立するので、未設定でもジョブは success で終わる。
      - name: Build Slack payload
        if: ${{ env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != '' }}
        env:
          BEADS_ID: ${{ steps.beads.outputs.id }}
          DQ_SCORE: ${{ needs.build.outputs.dq_score }}
          DQ_FAILED_RULES: ${{ needs.build.outputs.dq_failed_rules }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # 失敗ルールの文字列は beads(GitHub Markdown)と Slack で使い回している。
          # Slack の mrkdwn は太字が *bold* なので、**bold** はそのまま literal 表示になる。
          rules="$(printf '%s' "${DQ_FAILED_RULES}" | sed 's/\*\*/*/g')"
          text="$(printf ':rotating_light: Dataplex DQ FAIL — mart_steps_daily (score %s)\n\n%s\n\nbeads: %s\nRun: %s' \
                  "${DQ_SCORE}" "${rules}" "${BEADS_ID}" "${RUN_URL}")"
          jq -nc --arg channel "$SLACK_CHANNEL_ID" --arg text "$text" \
            '{channel: $channel, text: $text}' > slack-payload.json

      - name: Notify Slack
        id: slack
        if: ${{ env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != '' }}
        # 通知が届かなくても beads 起票は済んでいるので、ジョブ全体は落とさない。
        # ただし Daily Build の conclusion を failure にすると daily-build-triage が
        # 誤発火するので、job ではなく step で握る（下の Report Slack failure で可視化）。
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: ./slack-payload.json
          # 既定の errors:false は Slack が ok:false（not_in_channel 等）を返しても
          # ステップを success にする＝「緑なのに通知が届かない」サイレント失敗になる。
          errors: true

      - name: Report Slack failure
        if: ${{ steps.slack.outcome == 'failure' }}
        run: |
          echo "::error::Slack 通知に失敗した（beads 起票は成功している）。Slack App が通知先チャンネルに追加されているか、token に chat:write スコープがあるかを確認する。"
          echo "> :warning: **Slack 通知に失敗**（beads 起票は成功）。上のステップのログに Slack API のエラーが出ている。" >> "$GITHUB_STEP_SUMMARY"
