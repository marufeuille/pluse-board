name: Daily Build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"   # 毎日 09:00 JST（UTC 00:00 = SQLMesh @daily 境界に合わせる）
  workflow_dispatch:

permissions:
  id-token: write   # WIF 認証に必要
  contents: read
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: >-
            projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: fitbit-dashboard@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
          # OpenLineage → Dataplex 投入用に短命アクセストークンも発行する（ADC は従来どおり併存）
          token_format: access_token

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Ingest from Health API
        if: github.event_name != 'push'
        env:
          GOOGLE_HEALTH_CLIENT_ID: ${{ secrets.GOOGLE_HEALTH_CLIENT_ID }}
          GOOGLE_HEALTH_CLIENT_SECRET: ${{ secrets.GOOGLE_HEALTH_CLIENT_SECRET }}
          GOOGLE_HEALTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_HEALTH_REFRESH_TOKEN }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          # OpenLineage → Dataplex（Knowledge Catalog）に Health API→raw の辺を投入。
          # best-effort: 送信失敗しても ::warning:: のみで ingest は止めない（ingest/lineage.py）。
          OPENLINEAGE_URL: https://datalineage.googleapis.com
          OPENLINEAGE_ENDPOINT: v1/projects/${{ vars.PROJECT_ID }}/locations/${{ vars.BQ_LOCATION }}:processOpenLineageRunEvent
          OPENLINEAGE_API_KEY: ${{ steps.auth.outputs.access_token }}
        run: |
          uv sync --only-group ingest --only-group lineage
          uv run python ingest/pull_health_api.py

      - name: Check Health API freshness
        if: github.event_name != 'push'
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
        run: |
          uv run python ingest/check_health_data_freshness.py

      # SQLMesh: コード変更(push)はモデル差分を prod に適用、
      # データ更新(schedule/dispatch)は incremental 区間を前進実行。
      # state は Neon(Postgres) に永続化（SQLMESH_STATE_* secrets）。
      - name: Apply SQLMesh model changes (deploy)
        if: github.event_name == 'push'
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          SQLMESH_STATE_HOST: ${{ secrets.SQLMESH_STATE_HOST }}
          SQLMESH_STATE_USER: ${{ secrets.SQLMESH_STATE_USER }}
          SQLMESH_STATE_PASSWORD: ${{ secrets.SQLMESH_STATE_PASSWORD }}
        run: |
          uv sync --only-group sqlmesh
          cd sqlmesh_project && uv run sqlmesh --gateway ci plan --auto-apply --no-prompts

      - name: Run SQLMesh (advance intervals)
        if: github.event_name != 'push'
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          SQLMESH_STATE_HOST: ${{ secrets.SQLMESH_STATE_HOST }}
          SQLMESH_STATE_USER: ${{ secrets.SQLMESH_STATE_USER }}
          SQLMESH_STATE_PASSWORD: ${{ secrets.SQLMESH_STATE_PASSWORD }}
        run: |
          uv sync --only-group sqlmesh
          cd sqlmesh_project && uv run sqlmesh --gateway ci run

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build Evidence
        working-directory: reports
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          BQ_DATASET_MART: ${{ vars.BQ_DATASET_MART }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
        run: |
          npm ci
          npm run sources
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: reports/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
