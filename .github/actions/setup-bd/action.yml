name: Setup bd (beads)
description: Install dolt + bd, configure DoltHub credentials, restore beads from the DoltHub remote, and pull latest. Call after actions/checkout.

inputs:
  node-version:
    description: Node.js version used to install bd (npm global package).
    required: false
    default: "20"
  dolt-creds-key-id:
    description: DoltHub credentials key ID. Pass from caller workflow secrets.
    required: true
  dolt-creds-jwk:
    description: DoltHub credentials JWK. Pass from caller workflow secrets.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dolt
      shell: bash
      run: |
        set -uo pipefail
        # Try the official installer first; fall back to the GitHub release
        # binary when get.dolt.com is unreachable (e.g. transient DNS outage).
        arch="$(uname -m)"
        case "$arch" in
          x86_64) asset="dolt-linux-amd64.tar.gz" ;;
          aarch64|arm64) asset="dolt-linux-arm64.tar.gz" ;;
          *) echo "Unsupported arch: $arch" >&2; exit 1 ;;
        esac
        for i in 1 2 3 4 5; do
          if curl -LsSf https://get.dolt.com | bash; then
            dolt version
            exit 0
          fi
          echo "Install dolt via get.dolt.com attempt $i failed; retrying in 15s..." >&2
          sleep 15
        done
        echo "get.dolt.com unreachable after 5 attempts; falling back to GitHub release binary" >&2
        tmp="$(mktemp -d)"
        curl -LsSf -o "$tmp/$asset" \
          "https://github.com/dolthub/dolt/releases/latest/download/$asset"
        tar -xzf "$tmp/$asset" -C "$tmp"
        sudo install -m 0755 "$tmp"/dolt-*/bin/dolt /usr/local/bin/dolt
        rm -rf "$tmp"
        dolt version

    - name: Install bd
      shell: bash
      run: |
        for i in 1 2 3 4 5; do
          if npm install -g @beads/bd; then
            exit 0
          fi
          echo "Install bd attempt $i failed; retrying in 15s..." >&2
          sleep 15
        done
        echo "Install bd failed after 5 attempts" >&2
        exit 1

    - name: Configure DoltHub credentials
      shell: bash
      env:
        DOLT_CREDS_KEY_ID: ${{ inputs.dolt-creds-key-id }}
        DOLT_CREDS_JWK: ${{ inputs.dolt-creds-jwk }}
      run: |
        # dolt derives the credential filename from the key material, so the
        # JWK must be imported (not written to an arbitrary filename) for
        # `dolt creds use` to find it. Importing via stdin avoids leaving the
        # secret on disk outside dolt's own creds directory.
        printf '%s' "$DOLT_CREDS_JWK" | dolt creds import
        dolt creds use "$DOLT_CREDS_KEY_ID"

    - name: Restore beads from DoltHub
      shell: bash
      env:
        CI: 'true'
      run: bd bootstrap --yes

    - name: Pull latest
      shell: bash
      run: bd dolt pull || true
